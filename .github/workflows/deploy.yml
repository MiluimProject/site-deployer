name: Deploy Lovable site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Show package scripts
        run: |
          cat package.json | grep -A 10 scripts

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          echo "Root directory:"
          ls -la

          echo ""
          echo "Directories:"
          find . -maxdepth 2 -type d \
          -not -path "./node_modules*" | sort

          echo ""
          echo "HTML files:"
          find . -name "*.html" \
          -not -path "./node_modules/*"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
